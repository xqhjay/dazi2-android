name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".trae/**"
  workflow_dispatch:

# 同一分支新推送时取消旧的进行中构建，避免并发浪费
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK
        run: |
          echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ env.NDK_VERSION }}" >/dev/null 2>&1 || true
          # 确保平台和 build-tools 存在（runner 通常已预装）
          echo "y" | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
          ls /usr/local/lib/android/sdk/ndk/

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install npm dependencies
        run: npm install

      - name: Initialize Android project
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
        run: cargo tauri android init

      - name: Build APK (arm64-v8a only)
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
        run: cargo tauri android build --apk --target aarch64

      - name: Locate APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typing-boost-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload to gofile.io
        id: upload
        run: |
          APK="${{ steps.apk.outputs.apk_path }}"
          echo "Uploading $APK to gofile.io..."
          RESP=$(curl -sS -F "file=@${APK}" https://store1.gofile.io/uploadFile)
          echo "Response: $RESP"
          PAGE=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('downloadPage','') if d.get('data') else '')" 2>/dev/null || echo "")
          CODE=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('code','') if d.get('data') else '')" 2>/dev/null || echo "")
          echo "page=$PAGE" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          if [ -n "$PAGE" ]; then
            echo "::notice::APK 下载页: $PAGE"
          fi

      - name: Output result
        if: steps.upload.outputs.page != ''
        run: |
          echo "========================================"
          echo "✅ APK 构建并上传成功"
          echo "下载页: ${{ steps.upload.outputs.page }}"
          echo "提取码: ${{ steps.upload.outputs.code }}"
          echo "========================================"

      - name: Publish gofile link as commit status
        if: steps.upload.outputs.page != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d "{\"state\":\"success\",\"target_url\":\"${{ steps.upload.outputs.page }}\",\"description\":\"APK 下载页（提取码 ${{ steps.upload.outputs.code }}）\",\"context\":\"APK / gofile.io\"}"
          echo "Commit status published."
